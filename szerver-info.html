<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McJoin | Szerver Info</title>
    <link rel="stylesheet" href="info.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body class="info-page">

    <div class="background-overlay"></div>

    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">MCJOIN</a>
            <div class="nav-links">
                <a href="index.html">Főoldal</a>
                <a href="staff.html">Staff Team</a>
                <a href="szabalyzat.html">Szabályzat</a>
            </div>
        </div>
    </nav>

    <header class="info-header">
        <span class="badge">Szerver részletek</span>
        <h1>Minden, ami <span class="highlight">McJoin</span></h1>
    </header>

    <main class="info-grid">
        <div class="card wide">
            <h2>📊 Technikai Adatok</h2>
            <div class="stats-row">
                <div class="stat-item" onclick="copyToClipboard('mcjoin.usga.me')">
                    <label>Szerver IP (Másoláshoz kattints)</label>
                    <div class="ip-address">mcjoin.usga.me</div>
                    <span id="copy-msg">✅ MÁSOLVA!</span>
                </div>
                <div class="stat-item">
                    <label>Verzió</label>
                    <p>1.7.9 - 1.21.10</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="icon">📦</div>
            <h3>BoxPvP</h3>
            <p>Egyedi itemek és folyamatos harc a ranglétráért.</p>
        </div>

        <div class="card">
            <div class="icon">⚔️</div>
            <h3>Survival</h3>
            <p>Klánok, egyedi küldetések és fejlődési rendszer.</p>
        </div>
    </main>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.style.display = 'inline-block';
                setTimeout(() => { msg.style.display = 'none'; }, 2000);
            });
        }
    </script>
</body>
</html>
